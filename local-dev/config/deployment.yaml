apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-directory
  namespace: employee-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee-directory
  template:
    metadata:
      labels:
        app: employee-directory
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
      - name: main
        image: employee-api:local
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          privileged: false
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 256m
            memory: 256Mi
          limits:
            cpu: 512m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Namespace
metadata:
  name: employee-api
---
apiVersion: v1
kind: Service
metadata:
  name: employee-directory
  namespace: employee-api
spec:
  selector:
    app: employee-directory
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
