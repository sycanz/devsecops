apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
      - name: main
        image: nginx:latest
        securityContext:
          privileged: true # This is a major security risk!
          runAsUser: 0     # Running as root is a big no-no
