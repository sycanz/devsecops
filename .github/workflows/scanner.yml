name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  stage-1-lint-gitleaks:
    name: Stage 1 - Lint & Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Ruff Link
        uses: astral-sh/ruff-action@v3

  stage-2-fs-scan:
    name: Stage 2 - Trivy FS Scan
    needs: stage-1-lint-gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS scan (JSON output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Run Trivy FS scan (Table output for logs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # Stage 3: Container Build – If Stage 2 passes, then build the container.
  stage-3-container-build:
    name: Stage 3 - Container Build
    needs: stage-2-fs-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: devsecops-app:${{ github.sha }}

      - name: Save Docker image
        run: docker save devsecops-app:${{ github.sha }} -o devsecops-app.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: devsecops-app.tar
          retention-days: 1

  # Stage 4: Image Scan (Deep) – Scan the final built container image using trivy image.
  stage-4-image-scan:
    name: Stage 4 - Trivy Image Scan
    needs: stage-3-container-build
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: container-image

      - name: Load Docker image
        run: docker load -i devsecops-app.tar

      - name: Run Trivy Image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'devsecops-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # AI Auto-Remediation Job
  ai-remediation:
    name: AI Auto-Remediation
    needs: stage-2-fs-scan
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Scan Results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Remediation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_remedy.py

      - name: Create Pull Request with Fix
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "security: AI-suggested vulnerability fix"
          title: "AI Security Fix: Update dependencies"
          body: |
            This is an automated PR generated by the DevSecOps AI.
            It addresses the vulnerabilities found in the latest scan.
            
            Logs: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          branch: ai-security-fix
          base: main
          delete-branch: true
