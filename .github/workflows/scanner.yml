name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  stage-1-gitleaks:
    name: Stage 1 - Lint & Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  stage-2-fs-scan:
    name: Stage 2 - Trivy FS Scan
    needs: stage-1-gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan (FS mode)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy scan (IaC mode)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'json'
          output: 'trivy-iac-results.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Scan Results
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: trivy-*.json
          retention-days: 1

      - name: Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.ONCALL_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{\"text\":\"🚨 *Security Alert:* Critical/High vulnerabilities found in Stage 2 (FS/IaC Scan) for project ${{ github.repository }}. \nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}' \
          $SLACK_WEBHOOK

  # Stage 3: Container Build – If Stage 2 passes, then build and push to ECR.
  stage-3-container-build:
    name: Stage 3 - Build & Push to ECR
    needs: stage-2-fs-scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: devsecops-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker save $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -o devsecops-app.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v7
        with:
          name: container-image
          path: devsecops-app.tar
          retention-days: 1

  # Stage 4: Image Scan (Deep) – Scan the final built container image using trivy image.
  stage-4-image-scan:
    name: Stage 4 - Trivy Image Scan
    needs: stage-3-container-build
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: container-image

      - name: Load Docker image
        run: docker load -i devsecops-app.tar

      - name: Run Trivy Image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'devsecops-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.ONCALL_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{\"text\":\"🚨 *Security Alert:* Critical/High vulnerabilities found in Stage 4 (Image Scan) for project ${{ github.repository }}. \nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}' \
          $SLACK_WEBHOOK

  # Stage 5: Deploy to EKS (Final Step)
  stage-5-deploy:
    name: Stage 5 - Deploy to EKS
    needs: stage-4-image-scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name devsecops-cluster --region ap-southeast-1

      - name: Deploy to EKS
        run: |
          # Use envsubst to inject the new image tag into the k8s manifest
          # (Assume we have an app-deployment.yaml in k8s/)
          export IMAGE_TAG=${{ github.sha }}
          export ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}
          sed -i "s|image: .*|image: $ECR_REPOSITORY:$IMAGE_TAG|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml

  # AI Auto-Remediation Job
  ai-remediation:
    name: AI Auto-Remediation
    needs: [stage-2-fs-scan, stage-4-image-scan]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Scan Results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Remediation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_remedy.py

      - name: Create Pull Request with Fix
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "security: AI-suggested vulnerability fix"
          title: "AI Security Fix: Update dependencies"
          body: |
            This is an automated PR generated by the DevSecOps AI.
            It addresses the vulnerabilities found in the latest scan.
            
            Logs: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          branch: ai-security-fix
          base: main
          delete-branch: true
